<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
   
</head>
<body style="background:#e8f5e9; display:flex; justify-content:center; align-items:center; height:100vh;">

<div style="
    background:white;
    padding:24px;
    border-radius:10px;
    border:2px solid #1b5e20;
    width:320px;
">
    <h2 style="color:#1b5e20; margin-top:0;">Change Password</h2>

    <input id="old-password" type="password" placeholder="Old Password"
        style="width:100%; padding:10px; margin-bottom:10px; border:2px solid #1b5e20; border-radius:6px;">

    <input id="new-password" type="password" placeholder="New Password"
        style="width:100%; padding:10px; margin-bottom:10px; border:2px solid #1b5e20; border-radius:6px;">

    <input id="confirm-password" type="password" placeholder="Confirm New Password"
        style="width:100%; padding:10px; margin-bottom:10px; border:2px solid #1b5e20; border-radius:6px;">

    <div id="change-error" style="color:red; min-height:20px; margin-bottom:10px;"></div>

    <button id="change-password-btn"
        style="background:#1b5e20; color:white; padding:10px 16px; border:none; border-radius:6px; width:100%;">
        Update Password
    </button>
</div>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="change-password.js"></script>

</body>
</html>
