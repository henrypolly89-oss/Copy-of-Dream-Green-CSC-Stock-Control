<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Green – Staff Login</title>
    <link rel="stylesheet" href="frontoffice.css">
</head>
<body>

<main style="text-align:center; margin-top:80px;">
    <button id="user-login-btn" class="login-btn">Staff Login</button>
</main>

<!-- LOGIN MODAL -->
<div id="login-modal-overlay" style="
    display:none; 
    position:fixed; 
    top:0; left:0; 
    width:100%; height:100%; 
    background:rgba(0,0,0,0.5); 
    justify-content:center; 
    align-items:center; 
    z-index:9999;">
    
    <div style="
        background:#e8f5e9; 
        padding:20px; 
        border-radius:8px; 
        border:2px solid #1b5e20; 
        width:300px;">
        
        <h3 style="color:#1b5e20; margin-top:0;">User Login</h3>

        <input id="username-input" type="text" placeholder="Username" 
            style="width:100%; padding:10px; margin-bottom:10px; border:2px solid #1b5e20; border-radius:6px;">

        <input id="password-input" type="password" placeholder="Password" 
            style="width:100%; padding:10px; margin-bottom:10px; border:2px solid #1b5e20; border-radius:6px;">

        <div id="login-error" style="color:red; min-height:20px; margin-bottom:10px;"></div>

        <div style="display:flex; justify-content:space-between;">
            <button id="login-cancel-btn" style="background:#888; color:white; padding:8px 14px; border:none; border-radius:6px;">Cancel</button>
            <button id="login-submit-btn" style="background:#1b5e20; color:white; padding:8px 14px; border:none; border-radius:6px;">Login</button>
        </div>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Login Logic -->
<script src="frontoffice.js"></script>

</body>
</html>
