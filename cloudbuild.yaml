logsBucket: gs://dg-cloudbuild-logs

steps:
- name: 'gcr.io/cloud-builders/docker'
  dir: 'backend'
  args:
    - 'build'
    - '-t'
    - 'europe-west1-docker.pkg.dev/prime-bonbon-480612-p7/dream-green-repo/dreamgreen-image:test123'
    - '.'
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'push'
    - 'europe-west1-docker.pkg.dev/prime-bonbon-480612-p7/dream-green-repo/dreamgreen-image:test123'
- name: 'google/cloud-sdk:latest'
  entrypoint: 'gcloud'
  args:
    - 'run'
    - 'deploy'
    - 'dreamgreen-backend'
    - '--image'
    - 'europe-west1-docker.pkg.dev/prime-bonbon-480612-p7/dream-green-repo/dreamgreen-image:test123'
    - '--region'
    - 'europe-west1'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'

images:
- 'europe-west1-docker.pkg.dev/prime-bonbon-480612-p7/dream-green-repo/dreamgreen-image:test123'
